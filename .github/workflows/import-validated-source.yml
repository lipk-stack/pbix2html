name: Import Validated Source Bundle

on:
  push:
    branches: [main]
    paths:
      - .source-bundle/READY

permissions:
  contents: write

jobs:
  import-source:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Reconstruct and verify source archive
        run: |
          set -euo pipefail
          cat .source-bundle/chunk-*.b64 | base64 --decode > /tmp/pbix2html-source.zip
          echo "9526016b168e692079bd0063f31c2af3eec046bfd951aa8502f8fa7dbe1f637e  /tmp/pbix2html-source.zip" | sha256sum -c -
          unzip -tq /tmp/pbix2html-source.zip

      - name: Replace placeholder tree with validated source
        run: |
          set -euo pipefail
          find . -mindepth 1 -maxdepth 1 ! -name .git ! -name .source-bundle -exec rm -rf {} +
          unzip -q /tmp/pbix2html-source.zip -d .
          rm -rf .source-bundle

      - name: Commit validated source tree
        run: |
          set -euo pipefail
          git config user.name "pbix2html-release-bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git commit -m "feat: import PBIX2HTML Studio 1.5.0-beta.1 validated source"
          git push origin HEAD:main
