name: Import Validated Source Bundle

on:
  push:
    branches: [main]
    paths:
      - .source-bundle/READY

permissions:
  contents: write

jobs:
  import-source:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Reconstruct and verify source archive
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          parts = sorted(Path('.source-bundle').glob('hex-[0-9][0-9][0-9].part'))
          if not parts:
              raise SystemExit('No hex source bundle parts found')
          text = ''.join(path.read_text(encoding='ascii') for path in parts)
          Path('/tmp/pbix2html-source.zip').write_bytes(bytes.fromhex(text))
          print(f'Reconstructed {len(parts)} parts')
          PY
          echo "fef9741320172928053d2daf178c710fa5eeccadbbbfba08a34e39673e71369f  /tmp/pbix2html-source.zip" | sha256sum -c -
          unzip -tq /tmp/pbix2html-source.zip

      - name: Replace placeholder tree with validated source
        run: |
          set -euo pipefail
          find . -mindepth 1 -maxdepth 1 ! -name .git ! -name .source-bundle -exec rm -rf {} +
          unzip -q /tmp/pbix2html-source.zip -d .
          rm -rf .source-bundle

      - name: Commit validated source tree
        run: |
          set -euo pipefail
          git config user.name "pbix2html-release-bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git commit -m "feat: import PBIX2HTML Studio 1.5.0-beta.1 validated source"
          git push origin HEAD:main
