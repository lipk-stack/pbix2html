name: Build Public PBIX Corpus Resilient

on:
  pull_request:

permissions:
  contents: read

jobs:
  build-corpus:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - name: Build verified 100-file corpus with diagnostics
        id: corpus
        continue-on-error: true
        run: |
          mkdir -p corpus
          python3 - <<'PY' 2>&1 | tee corpus/builder.log
          import csv, hashlib, json, pathlib, re, time, traceback, urllib.parse, urllib.request
          owner, repo, ref = 'microsoft', 'powerbi-desktop-samples', 'main'
          target, min_size, max_size = 100, 10_000, 75_000_000
          out = pathlib.Path('corpus')
          headers = {'Accept':'application/vnd.github+json','User-Agent':'pbix2html-corpus/1.1','X-GitHub-Api-Version':'2022-11-28'}
          diagnostics={'source_repository':f'{owner}/{repo}','source_ref':ref,'target':target,'events':[]}
          manifest=[]
          try:
              tree_url=f'https://api.github.com/repos/{owner}/{repo}/git/trees/{ref}?recursive=1'
              with urllib.request.urlopen(urllib.request.Request(tree_url,headers=headers),timeout=90) as r:
                  tree=json.load(r)
              diagnostics['tree_truncated']=bool(tree.get('truncated'))
              candidates=[]
              for x in tree.get('tree',[]):
                  p=x.get('path',''); s=int(x.get('size') or 0)
                  if x.get('type')=='blob' and p.lower().endswith('.pbix') and min_size <= s <= max_size:
                      candidates.append({'path':p,'size':s,'git_blob_sha':x.get('sha')})
              candidates.sort(key=lambda x:(x['size'],x['path'].lower()))
              diagnostics['candidate_count']=len(candidates)
              diagnostics['candidate_total_bytes']=sum(x['size'] for x in candidates)
              print(f'Candidates: {len(candidates)}')
              if tree.get('truncated'):
                  raise RuntimeError('GitHub recursive tree response was truncated')
              def safe(n): return (re.sub(r'[^A-Za-z0-9._-]+','_',n).strip('._')[:140] or 'sample.pbix')
              for candidate_index,x in enumerate(candidates,1):
                  if len(manifest)>=target: break
                  ep=urllib.parse.quote(x['path'],safe='/')
                  raw=f'https://raw.githubusercontent.com/{owner}/{repo}/{ref}/{ep}'
                  ordinal=len(manifest)+1
                  fn=f"{ordinal:03d}__{safe(pathlib.PurePosixPath(x['path']).name)}"
                  dest=out/fn
                  last_error=None
                  for attempt in range(1,4):
                      try:
                          print(f"candidate {candidate_index}/{len(candidates)} -> sample {ordinal}/{target}, attempt {attempt}: {x['path']} ({x['size']} bytes)",flush=True)
                          h=hashlib.sha256(); total=0
                          req=urllib.request.Request(raw,headers={'User-Agent':'pbix2html-corpus/1.1'})
                          with urllib.request.urlopen(req,timeout=240) as r, dest.open('wb') as f:
                              while True:
                                  b=r.read(1024*1024)
                                  if not b: break
                                  f.write(b); h.update(b); total+=len(b)
                                  if total>max_size: raise RuntimeError('download exceeded max size')
                          if total != x['size']: raise RuntimeError(f"size mismatch expected={x['size']} actual={total}")
                          sig=dest.read_bytes()[:4]
                          item={'index':ordinal,'local_file':fn,'repository':f'{owner}/{repo}','ref':ref,'path':x['path'],'source_url':raw,'size':total,'git_blob_sha':x['git_blob_sha'],'sha256':h.hexdigest(),'zip_like':sig.startswith(b'PK')}
                          manifest.append(item)
                          last_error=None
                          break
                      except Exception as e:
                          last_error=f'{type(e).__name__}: {e}'
                          diagnostics['events'].append({'path':x['path'],'attempt':attempt,'error':last_error})
                          try: dest.unlink(missing_ok=True)
                          except Exception: pass
                          time.sleep(attempt)
                  if last_error:
                      print(f'SKIP {x["path"]}: {last_error}',flush=True)
              (out/'manifest.json').write_text(json.dumps(manifest,indent=2),encoding='utf-8')
              if manifest:
                  with (out/'manifest.csv').open('w',newline='',encoding='utf-8') as f:
                      w=csv.DictWriter(f,fieldnames=list(manifest[0])); w.writeheader(); w.writerows(manifest)
              diagnostics['selected_count']=len(manifest)
              diagnostics['total_bytes']=sum(x['size'] for x in manifest)
              diagnostics['zip_like_count']=sum(1 for x in manifest if x['zip_like'])
              diagnostics['failed_download_events']=len(diagnostics['events'])
              for item in manifest:
                  p=out/item['local_file']
                  actual=hashlib.sha256(p.read_bytes()).hexdigest()
                  if actual != item['sha256']: raise RuntimeError(f'hash mismatch: {p}')
              if len(manifest)<target: raise RuntimeError(f'Only {len(manifest)} verified files acquired; need {target}')
              print(f'Verified {len(manifest)}/{target} files')
          except Exception as e:
              diagnostics['fatal_error']=f'{type(e).__name__}: {e}'
              diagnostics['traceback']=traceback.format_exc()
              print(diagnostics['traceback'],flush=True)
          finally:
              (out/'corpus-summary.json').write_text(json.dumps(diagnostics,indent=2),encoding='utf-8')
              print(json.dumps({k:v for k,v in diagnostics.items() if k not in ('events','traceback')},indent=2),flush=True)
          if len(manifest)<target:
              raise SystemExit(1)
          PY
      - name: Upload corpus and diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pbix-public-corpus-100-resilient
          path: corpus/
          if-no-files-found: error
          compression-level: 0
          retention-days: 7
      - name: Fail if corpus build failed
        if: steps.corpus.outcome != 'success'
        run: exit 1
