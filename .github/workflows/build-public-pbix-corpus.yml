name: Build Public PBIX Corpus

# Consolidates the previous five overlapping corpus workflows into one
# manually-triggered job backed by scripts/build_pbix_corpus.py.
# It no longer runs on every pull request: downloading hundreds of MB of
# sample files belongs in an on-demand job, not in PR CI.

on:
  workflow_dispatch:
    inputs:
      target:
        description: Number of PBIX files to collect
        default: "25"
      allow_search:
        description: Also search public GitHub repos beyond the official Microsoft samples
        type: boolean
        default: false
      best_effort:
        description: Succeed even if fewer than target files are found
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  build-corpus:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Build corpus
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python3 scripts/build_pbix_corpus.py \
            --target "${{ inputs.target }}" \
            ${{ inputs.allow_search && '--allow-search' || '' }} \
            ${{ inputs.best_effort && '--best-effort' || '' }} \
            --out corpus 2>&1 | tee corpus-builder.log

      - name: Upload corpus and diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pbix-public-corpus
          path: |
            corpus/
            corpus-builder.log
          if-no-files-found: error
          compression-level: 0
          retention-days: 7
