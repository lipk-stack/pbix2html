name: Build Public PBIX Corpus

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/build-public-pbix-corpus.yml

permissions:
  contents: read

jobs:
  build-corpus:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Discover and download 100 published PBIX files
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python3 - <<'PY'
          import csv
          import hashlib
          import json
          import os
          import pathlib
          import re
          import urllib.parse
          import urllib.request

          OWNER = "microsoft"
          REPO = "powerbi-desktop-samples"
          REF = "main"
          TARGET = 100
          MIN_SIZE = 100_000
          MAX_SIZE = 50_000_000
          OUT = pathlib.Path("corpus")
          OUT.mkdir(exist_ok=True)

          token = os.environ.get("GH_TOKEN", "")
          headers = {
              "Accept": "application/vnd.github+json",
              "User-Agent": "pbix2html-public-corpus-builder/1.0",
              "X-GitHub-Api-Version": "2022-11-28",
          }
          if token:
              headers["Authorization"] = f"Bearer {token}"

          tree_url = f"https://api.github.com/repos/{OWNER}/{REPO}/git/trees/{REF}?recursive=1"
          req = urllib.request.Request(tree_url, headers=headers)
          with urllib.request.urlopen(req, timeout=60) as resp:
              tree = json.load(resp)

          if tree.get("truncated"):
              raise SystemExit("GitHub recursive tree response was truncated; refusing a partial corpus")

          candidates = []
          for item in tree.get("tree", []):
              path = item.get("path", "")
              size = int(item.get("size") or 0)
              if item.get("type") != "blob" or not path.lower().endswith(".pbix"):
                  continue
              if size < MIN_SIZE or size > MAX_SIZE:
                  continue
              candidates.append({
                  "path": path,
                  "size": size,
                  "git_blob_sha": item.get("sha"),
              })

          candidates.sort(key=lambda x: (x["size"], x["path"].lower()))
          if len(candidates) < TARGET:
              raise SystemExit(f"Only {len(candidates)} qualifying PBIX files found; need {TARGET}")

          selected = candidates[:TARGET]
          manifest = []

          def safe_name(name: str) -> str:
              name = re.sub(r"[^A-Za-z0-9._-]+", "_", name).strip("._")
              return name[:140] or "sample.pbix"

          for index, item in enumerate(selected, 1):
              encoded_path = urllib.parse.quote(item["path"], safe="/")
              raw_url = f"https://raw.githubusercontent.com/{OWNER}/{REPO}/{REF}/{encoded_path}"
              file_name = f"{index:03d}__{safe_name(pathlib.PurePosixPath(item['path']).name)}"
              dest = OUT / file_name
              print(f"[{index:03d}/{TARGET}] {item['path']} ({item['size']} bytes)", flush=True)

              req = urllib.request.Request(raw_url, headers={"User-Agent": headers["User-Agent"]})
              h = hashlib.sha256()
              total = 0
              with urllib.request.urlopen(req, timeout=180) as resp, dest.open("wb") as fh:
                  while True:
                      chunk = resp.read(1024 * 1024)
                      if not chunk:
                          break
                      fh.write(chunk)
                      h.update(chunk)
                      total += len(chunk)
                      if total > MAX_SIZE:
                          raise RuntimeError(f"Download exceeded max size: {item['path']}")

              if total != item["size"]:
                  raise RuntimeError(f"Size mismatch for {item['path']}: expected {item['size']}, got {total}")

              with dest.open("rb") as fh:
                  signature = fh.read(4)
              zip_like = signature.startswith(b"PK")

              manifest.append({
                  "index": index,
                  "local_file": file_name,
                  "repository": f"{OWNER}/{REPO}",
                  "ref": REF,
                  "path": item["path"],
                  "source_url": raw_url,
                  "size": total,
                  "git_blob_sha": item["git_blob_sha"],
                  "sha256": h.hexdigest(),
                  "zip_like": zip_like,
              })

          (OUT / "manifest.json").write_text(json.dumps(manifest, indent=2), encoding="utf-8")
          with (OUT / "manifest.csv").open("w", newline="", encoding="utf-8") as fh:
              writer = csv.DictWriter(fh, fieldnames=list(manifest[0].keys()))
              writer.writeheader()
              writer.writerows(manifest)

          summary = {
              "source_repository": f"{OWNER}/{REPO}",
              "source_ref": REF,
              "candidate_count": len(candidates),
              "selected_count": len(manifest),
              "selection_rule": "100 smallest PBIX blobs between 100KB and 50MB, sorted by size then path",
              "total_bytes": sum(x["size"] for x in manifest),
              "zip_like_count": sum(1 for x in manifest if x["zip_like"]),
          }
          (OUT / "corpus-summary.json").write_text(json.dumps(summary, indent=2), encoding="utf-8")
          print(json.dumps(summary, indent=2))
          PY

      - name: Verify corpus count and hashes
        run: |
          python3 - <<'PY'
          import hashlib, json, pathlib
          root = pathlib.Path('corpus')
          manifest = json.loads((root / 'manifest.json').read_text())
          assert len(manifest) == 100, len(manifest)
          for item in manifest:
              p = root / item['local_file']
              assert p.is_file(), p
              h = hashlib.sha256(p.read_bytes()).hexdigest()
              assert h == item['sha256'], (p, h, item['sha256'])
          print('Verified 100/100 corpus files and SHA-256 hashes')
          PY

      - name: Upload PBIX corpus artifact
        uses: actions/upload-artifact@v4
        with:
          name: pbix-public-corpus-100
          path: corpus/
          if-no-files-found: error
          compression-level: 0
          retention-days: 7
