name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      matrix:
        python-version: ["3.9", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Byte-compile all sources
        run: python -m compileall -q pbix2html tests scripts

      - name: Run unit tests
        run: python -m unittest discover -v

      - name: CLI smoke test
        run: |
          python - <<'PY'
          from tests.helpers import build_pbix
          open('smoke.pbix', 'wb').write(build_pbix().getvalue())
          PY
          python -m pbix2html smoke.pbix -o smoke.html
          grep -q '<!DOCTYPE html>' smoke.html
