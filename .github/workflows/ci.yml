name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      matrix:
        python-version: ["3.9", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Byte-compile all sources
        run: python -m compileall -q pbix2html tests scripts

      - name: Run unit tests
        run: python -m unittest discover -v

      - name: Syntax-check embedded browser runtime
        run: |
          python - <<'PY'
          from pbix2html.render import _JS
          open('runtime.js', 'w', encoding='utf-8').write(_JS)
          PY
          node --check runtime.js

      - name: CLI smoke test
        run: |
          python - <<'PY'
          from tests.helpers import build_pbix
          open('smoke.pbix', 'wb').write(build_pbix().getvalue())
          PY
          python -m pbix2html smoke.pbix -o smoke.html
          python - <<'PY'
          from pathlib import Path
          output = Path('smoke.html').read_text(encoding='utf-8')
          assert output.startswith('<!DOCTYPE html>')
          assert 'class="page-tabs"' in output
          assert 'Layout-only compatibility mode' in output
          assert '<script>' in output
          lower = output.lower()
          assert 'src="http://' not in lower
          assert 'src="https://' not in lower
          assert 'href="http://' not in lower
          assert 'href="https://' not in lower
          PY
